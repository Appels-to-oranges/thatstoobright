name: Build And Publish Latest EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows executable
        run: npm run build

      - name: Move latest tag to current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest $env:GITHUB_SHA
          git push origin refs/tags/latest --force

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            gh release create latest `
              --repo $env:GITHUB_REPOSITORY `
              --title "ThatsTooBright (Latest)" `
              --notes "Automated latest build from main."
          }
          gh release upload latest "dist/ThatsTooBright.exe" `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
